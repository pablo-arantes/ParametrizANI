site_name: ParametrizANI
site_description: Fast and Accessible Dihedral Parametrization for Small Molecules
site_author: Pablo R. Arantes, Souvik Sinha, Giulia Palermo
site_url: https://pablo-arantes.github.io/ParametrizANI/

repo_name: pablo-arantes/ParametrizANI
repo_url: https://github.com/pablo-arantes/ParametrizANI

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started:
    - Installation: installation.md
    - Quick Start: quickstart.md
  - User Guide:
    - Workflow: workflow.md
    - Supported Methods: methods.md
    - Examples: examples.md
  - API Reference:
    - ConformerGenerator: api/conformer_gen.md
    - ReferenceEnergyCalculator: api/reference_energy.md
    - EnergyMinimizer: api/energy_minimization.md
    - DihedralOptimizer: api/dihedral_optimizer.md
    - ParameterValidator: api/validation.md
    - TopologyGenerator: api/topology_gen.md
    - Utilities: api/utils.md
    - Psi4 RESP (Optional): api/psi4_utils.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2
            docstring_style: numpy
            show_signature_annotations: true
            separate_signature: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/pablo-arantes/ParametrizANI
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/pablitoarantes
